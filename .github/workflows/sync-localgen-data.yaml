name: Sync LocalGen metadata

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_localgen.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No metadata changes detected."
            exit 0
          fi
          git add data/project.json data/releases.json data/contributors.json
          git commit -m "chore(data): sync localgen metadata"
          git push
