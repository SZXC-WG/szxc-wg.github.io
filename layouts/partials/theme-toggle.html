<button
  class="theme-toggle"
  type="button"
  data-theme-toggle
  data-toggle-label="{{ i18n "theme_toggle" }}"
  data-label-light="{{ i18n "theme_light" }}"
  data-label-dark="{{ i18n "theme_dark" }}"
  aria-label="{{ i18n "theme_toggle" }}"
  title="{{ i18n "theme_toggle" }}"
>
  <span aria-hidden="true" data-theme-icon>🌙</span>
  <span class="sr-only" data-theme-text>{{ i18n "theme_dark" }}</span>
</button>
