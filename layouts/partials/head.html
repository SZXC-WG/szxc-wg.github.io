{{ $title := cond .IsHome .Site.Title (printf "%s · %s" .Title .Site.Title) }}
{{ $description := .Description | default .Summary | default .Site.Params.description }}
{{ $style := resources.Get "css/main.css" | minify | fingerprint }}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ $description }}">
<meta name="color-scheme" content="dark light">
<title>{{ $title }}</title>
<link rel="canonical" href="{{ .Permalink }}">
<link rel="icon" href="{{ "favicon.png" | relURL }}" type="image/png">
<link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}">
<meta property="og:title" content="{{ $title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "favicon.png" | absURL }}">
<meta name="twitter:card" content="summary_large_image">
